<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Callix — Dashboard</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1c202a;
    --border: #262a34;
    --text: #f2f3f5;
    --muted: #9aa1ac;
    --accent: #5b6cff;
    --accent-hover: #4756e0;
    --danger: #ff5c6c;
    --success: #35c17e;
    --warning: #f5a623;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0f1115;
    color: var(--text);
    min-height: 100vh;
  }

  /* ---- Top bar ---- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(15,17,21,0.9);
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-mark {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
  }
  .logo-text { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }

  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--panel); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted); position: relative;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--panel-2); color: var(--text); }
  .notif-dot {
    position: absolute; top: -3px; right: -3px;
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--danger); border: 2px solid var(--bg);
    display: none;
  }

  .user-menu-wrap { position: relative; }
  .avatar-btn {
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; border: none; color: white;
  }
  .dropdown {
    position: absolute; top: 46px; right: 0;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; min-width: 200px; overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    display: none; z-index: 20;
  }
  .dropdown.open { display: block; }
  .dropdown-header { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .dropdown-name { font-size: 13px; font-weight: 600; }
  .dropdown-email { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .dropdown-item {
    padding: 10px 14px; font-size: 13px; cursor: pointer;
    color: var(--text); display: flex; align-items: center; gap: 8px;
    transition: background 0.12s;
  }
  .dropdown-item:hover { background: var(--panel-2); }
  .dropdown-item.danger { color: var(--danger); }

  /* ---- Layout ---- */
  .container { max-width: 1080px; margin: 0 auto; padding: 32px 24px 60px; }
  .greeting { font-size: 24px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.02em; }
  .greeting-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

  /* ---- Quick actions ---- */
  .quick-actions {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 36px;
  }
  .qa-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 18px;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    text-align: left;
  }
  .qa-card:hover { transform: translateY(-2px); border-color: #33394a; background: var(--panel-2); }
  .qa-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px; font-size: 18px;
  }
  .qa-icon.new { background: rgba(91,108,255,0.15); }
  .qa-icon.join { background: rgba(53,193,126,0.15); }
  .qa-icon.schedule { background: rgba(245,166,35,0.15); }
  .qa-icon.calendar { background: rgba(139,92,246,0.15); }
  .qa-title { font-size: 14.5px; font-weight: 600; margin-bottom: 3px; }
  .qa-desc { font-size: 12.5px; color: var(--muted); }

  /* ---- Sections ---- */
  .section { margin-bottom: 32px; }
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title { font-size: 16px; font-weight: 700; }
  .section-link { font-size: 13px; color: var(--accent); cursor: pointer; text-decoration: none; }
  .section-link:hover { text-decoration: underline; }

  .meeting-list { display: flex; flex-direction: column; gap: 10px; }
  .meeting-row {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    transition: border-color 0.15s;
  }
  .meeting-row:hover { border-color: #33394a; }
  .meeting-date-block {
    width: 48px; text-align: center; flex-shrink: 0;
    background: var(--panel-2); border-radius: 9px; padding: 6px 0;
  }
  .meeting-date-month { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .meeting-date-day { font-size: 17px; font-weight: 700; }
  .meeting-info { flex: 1; min-width: 0; }
  .meeting-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meeting-meta { font-size: 12.5px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }
  .meeting-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-small {
    padding: 7px 14px; border-radius: 8px; font-size: 12.5px; font-weight: 600;
    border: none; cursor: pointer; transition: background 0.15s;
  }
  .btn-small.primary { background: var(--accent); color: white; }
  .btn-small.primary:hover { background: var(--accent-hover); }
  .btn-small.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-small.ghost:hover { background: var(--panel-2); }

  .empty-state {
    text-align: center; padding: 40px 20px;
    background: var(--panel); border: 1px dashed var(--border);
    border-radius: 12px; color: var(--muted); font-size: 13.5px;
  }

  /* ---- Modal ---- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 50; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; width: 100%; max-width: 380px;
  }
  .modal h2 { margin: 0 0 18px; font-size: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 10px 12px; background: #10131a;
    border: 1px solid var(--border); border-radius: 9px; color: var(--text);
    font-size: 14px; outline: none;
  }
  .field input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .modal-actions .btn-small { flex: 1; padding: 10px; font-size: 13.5px; }

  @media (max-width: 720px) {
    .quick-actions { grid-template-columns: repeat(2, 1fr); }
    .meeting-actions { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">C</div>
    <div class="logo-text">Callix</div>
  </div>
  <div class="topbar-right">
    <div class="icon-btn" id="notif-btn" title="Notifications">
      🔔<span class="notif-dot" id="notif-dot"></span>
    </div>
    <div class="user-menu-wrap">
      <button class="avatar-btn" id="avatar-btn">?</button>
      <div class="dropdown" id="dropdown">
        <div class="dropdown-header">
          <div class="dropdown-name" id="dd-name">—</div>
          <div class="dropdown-email" id="dd-email">—</div>
        </div>
        <div class="dropdown-item" id="dd-profile">👤 Profile</div>
        <div class="dropdown-item" id="dd-settings">⚙️ Settings</div>
        <div class="dropdown-item danger" id="dd-signout">🚪 Sign Out</div>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <h1 class="greeting" id="greeting">Welcome back</h1>
  <p class="greeting-sub">Here's what's happening with your meetings.</p>

  <div class="quick-actions">
    <button class="qa-card" id="qa-new">
      <div class="qa-icon new">🎥</div>
      <div class="qa-title">New Meeting</div>
      <div class="qa-desc">Start an instant call</div>
    </button>
    <button class="qa-card" id="qa-join">
      <div class="qa-icon join">🚪</div>
      <div class="qa-title">Join Meeting</div>
      <div class="qa-desc">Enter a code or link</div>
    </button>
    <button class="qa-card" id="qa-schedule">
      <div class="qa-icon schedule">📅</div>
      <div class="qa-title">Schedule</div>
      <div class="qa-desc">Plan a future meeting</div>
    </button>
    <button class="qa-card" id="qa-calendar">
      <div class="qa-icon calendar">🗓️</div>
      <div class="qa-title">Calendar</div>
      <div class="qa-desc">View all your events</div>
    </button>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-title">Upcoming Meetings</div>
      <a class="section-link" id="view-all-upcoming">View all</a>
    </div>
    <div class="meeting-list" id="upcoming-list">
      <div class="empty-state">Loading…</div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-title">Recent Meetings</div>
      <a class="section-link" id="view-all-recent">View all</a>
    </div>
    <div class="meeting-list" id="recent-list">
      <div class="empty-state">Loading…</div>
    </div>
  </div>
</div>

<!-- Join Meeting Modal -->
<div class="modal-overlay" id="join-modal">
  <div class="modal">
    <h2>Join a meeting</h2>
    <div class="field">
      <label for="join-code">Meeting code or link</label>
      <input type="text" id="join-code" placeholder="e.g. abc-defg-hij" />
    </div>
    <div class="field">
      <label for="join-name">Your name</label>
      <input type="text" id="join-name" placeholder="Display name" />
    </div>
    <div class="modal-actions">
      <button class="btn-small ghost" id="join-cancel">Cancel</button>
      <button class="btn-small primary" id="join-confirm">Continue</button>
    </div>
  </div>
</div>

<!-- New Meeting Modal -->
<div class="modal-overlay" id="new-modal">
  <div class="modal">
    <h2>Start an instant meeting</h2>
    <p style="color:var(--muted); font-size:13px; margin:-8px 0 16px;">A new meeting code will be generated right away.</p>
    <div class="modal-actions">
      <button class="btn-small ghost" id="new-cancel">Cancel</button>
      <button class="btn-small primary" id="new-confirm">Start Now</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, query, where, orderBy,
    getDocs, serverTimestamp, Timestamp, limit
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB2RZlRNlTONf4xuxjPMcZgedc9wbIhj-4",
    authDomain: "axid-ai.firebaseapp.com",
    projectId: "axid-ai",
    storageBucket: "axid-ai.firebasestorage.app",
    messagingSenderId: "354519561790",
    appId: "1:354519561790:web:e2b25803bcd713aea4836f",
    measurementId: "G-RBDLQZ6BZB"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;

  // ---- Auth guard ----
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "index.html";
      return;
    }
    currentUser = user;
    const name = user.displayName || user.email.split("@")[0];
    document.getElementById("greeting").textContent = `Welcome back, ${name.split(" ")[0]}`;
    document.getElementById("avatar-btn").textContent = name.charAt(0).toUpperCase();
    document.getElementById("dd-name").textContent = name;
    document.getElementById("dd-email").textContent = user.email;
    loadMeetings();
  });

  // ---- Dropdown ----
  const dropdown = document.getElementById("dropdown");
  document.getElementById("avatar-btn").addEventListener("click", (e) => {
    e.stopPropagation();
    dropdown.classList.toggle("open");
  });
  document.addEventListener("click", () => dropdown.classList.remove("open"));
  document.getElementById("dd-signout").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "index.html";
  });
  document.getElementById("dd-profile").addEventListener("click", () => {
    window.location.href = "profile.html";
  });
  document.getElementById("dd-settings").addEventListener("click", () => {
    window.location.href = "settings.html";
  });

  // ---- Quick actions ----
  document.getElementById("qa-schedule").addEventListener("click", () => {
    window.location.href = "schedule.html";
  });
  document.getElementById("qa-calendar").addEventListener("click", () => {
    window.location.href = "schedule.html#calendar";
  });

  // New meeting modal
  const newModal = document.getElementById("new-modal");
  document.getElementById("qa-new").addEventListener("click", () => newModal.classList.add("open"));
  document.getElementById("new-cancel").addEventListener("click", () => newModal.classList.remove("open"));
  document.getElementById("new-confirm").addEventListener("click", async () => {
    const code = generateMeetingCode();
    await addDoc(collection(db, "meetings"), {
      hostId: currentUser.uid,
      hostEmail: currentUser.email,
      title: "Instant Meeting",
      code,
      startTime: serverTimestamp(),
      type: "instant",
      createdAt: serverTimestamp()
    });
    window.location.href = `room.html?code=${code}`;
  });

  // Join meeting modal
  const joinModal = document.getElementById("join-modal");
  document.getElementById("qa-join").addEventListener("click", () => joinModal.classList.add("open"));
  document.getElementById("join-cancel").addEventListener("click", () => joinModal.classList.remove("open"));
  document.getElementById("join-confirm").addEventListener("click", () => {
    const code = document.getElementById("join-code").value.trim();
    const name = document.getElementById("join-name").value.trim();
    if (!code) return;
    window.location.href = `room.html?code=${encodeURIComponent(code)}&name=${encodeURIComponent(name)}`;
  });

  function generateMeetingCode() {
    const chars = "abcdefghijkmnopqrstuvwxyz23456789";
    const part = () => Array.from({length: 3}, () => chars[Math.floor(Math.random() * chars.length)]).join("");
    return `${part()}-${part()}-${part()}`;
  }

  // ---- Load meetings from Firestore ----
  async function loadMeetings() {
    const upcomingList = document.getElementById("upcoming-list");
    const recentList = document.getElementById("recent-list");

    try {
      const q = query(
        collection(db, "meetings"),
        where("hostId", "==", currentUser.uid),
        orderBy("createdAt", "desc"),
        limit(20)
      );
      const snap = await getDocs(q);

      if (snap.empty) {
        upcomingList.innerHTML = emptyState("No upcoming meetings. Schedule one to get started.");
        recentList.innerHTML = emptyState("No recent meetings yet.");
        return;
      }

      const now = Date.now();
      const upcoming = [];
      const recent = [];

      snap.forEach(doc => {
        const data = doc.data();
        const start = data.startTime instanceof Timestamp ? data.startTime.toMillis() : now;
        const item = { id: doc.id, ...data, startMillis: start };
        if (start >= now) upcoming.push(item);
        else recent.push(item);
      });

      upcomingList.innerHTML = upcoming.length
        ? upcoming.map(renderMeetingRow).join("")
        : emptyState("No upcoming meetings. Schedule one to get started.");

      recentList.innerHTML = recent.length
        ? recent.slice(0, 5).map(renderMeetingRow).join("")
        : emptyState("No recent meetings yet.");

    } catch (err) {
      console.error(err);
      upcomingList.innerHTML = emptyState("Couldn't load meetings. " + (err.message || ""));
      recentList.innerHTML = "";
    }
  }

  function emptyState(text) {
    return `<div class="empty-state">${escapeHtml(text)}</div>`;
  }

  function renderMeetingRow(m) {
    const date = new Date(m.startMillis);
    const month = date.toLocaleString(undefined, { month: "short" });
    const day = date.getDate();
    const time = date.toLocaleString(undefined, { hour: "numeric", minute: "2-digit" });
    return `
      <div class="meeting-row">
        <div class="meeting-date-block">
          <div class="meeting-date-month">${month}</div>
          <div class="meeting-date-day">${day}</div>
        </div>
        <div class="meeting-info">
          <div class="meeting-title">${escapeHtml(m.title || "Untitled Meeting")}</div>
          <div class="meeting-meta">
            <span>${time}</span>
            <span>Code: ${escapeHtml(m.code || "—")}</span>
          </div>
        </div>
        <div class="meeting-actions">
          <button class="btn-small primary" onclick="window.location.href='room.html?code=${encodeURIComponent(m.code)}'">Join</button>
        </div>
      </div>
    `;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }
</script>

</body>
</html>
