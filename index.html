<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Callix — Sign In</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #262a34;
    --text: #f2f3f5;
    --muted: #9aa1ac;
    --accent: #5b6cff;
    --accent-hover: #4756e0;
    --danger: #ff5c6c;
    --success: #35c17e;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at 20% 20%, #1a1e29, #0f1115 60%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .logo-mark {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
  }
  .logo-text {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  h1 {
    font-size: 20px;
    text-align: center;
    margin: 0 0 4px;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }
  .field { margin-bottom: 14px; }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 11px 12px;
    background: #10131a;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
    margin-top: 6px;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-google {
    background: #1e222c;
    color: var(--text);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
  }
  .btn-google:hover { background: #262b36; }
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0;
    color: var(--muted);
    font-size: 12px;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .switch-row {
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
    color: var(--muted);
  }
  .switch-row a, .forgot-link {
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
    font-weight: 600;
  }
  .switch-row a:hover, .forgot-link:hover { text-decoration: underline; }
  .forgot-row {
    text-align: right;
    font-size: 12.5px;
    margin: -8px 0 14px;
  }
  .message {
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 14px;
    display: none;
  }
  .message.error {
    background: rgba(255,92,108,0.12);
    color: var(--danger);
    border: 1px solid rgba(255,92,108,0.3);
    display: block;
  }
  .message.success {
    background: rgba(53,193,126,0.12);
    color: var(--success);
    border: 1px solid rgba(53,193,126,0.3);
    display: block;
  }
  .hidden { display: none !important; }
  .user-panel { text-align: center; }
  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    margin: 0 auto 14px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    object-fit: cover;
  }
  .user-email { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .verify-badge {
    display: inline-block;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    margin-top: 6px;
  }
  .verify-badge.yes { background: rgba(53,193,126,0.15); color: var(--success); }
  .verify-badge.no { background: rgba(255,92,108,0.15); color: var(--danger); }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    margin-top: 10px;
  }
  .btn-secondary:hover { background: #1e222c; }
</style>
</head>
<body>

<div class="card">

  <div class="logo">
    <div class="logo-mark">C</div>
    <div class="logo-text">Callix</div>
  </div>

  <div id="message" class="message"></div>

  <!-- SIGN IN FORM -->
  <div id="signin-view">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue to Callix</p>

    <form id="signin-form">
      <div class="field">
        <label for="signin-email">Email</label>
        <input type="email" id="signin-email" required autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="signin-password">Password</label>
        <input type="password" id="signin-password" required autocomplete="current-password" placeholder="••••••••" />
      </div>
      <div class="forgot-row">
        <span class="forgot-link" id="show-forgot">Forgot password?</span>
      </div>
      <button type="submit" class="btn btn-primary" id="signin-btn">Sign In</button>
    </form>

    <div class="divider">OR</div>

    <button class="btn btn-google" id="google-signin">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.61z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.94v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.17.28-1.7V4.97H.94A9 9 0 0 0 0 9c0 1.45.35 2.83.94 4.03l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .94 4.97l3.01 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>

    <div class="switch-row">
      Don't have an account? <a id="show-signup">Sign up</a>
    </div>
  </div>

  <!-- SIGN UP FORM -->
  <div id="signup-view" class="hidden">
    <h1>Create your account</h1>
    <p class="subtitle">Start meeting with Callix</p>

    <form id="signup-form">
      <div class="field">
        <label for="signup-name">Full name</label>
        <input type="text" id="signup-name" required autocomplete="name" placeholder="Jane Doe" />
      </div>
      <div class="field">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" required autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters" />
      </div>
      <button type="submit" class="btn btn-primary" id="signup-btn">Create Account</button>
    </form>

    <div class="divider">OR</div>

    <button class="btn btn-google" id="google-signup">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.61z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.94v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.17.28-1.7V4.97H.94A9 9 0 0 0 0 9c0 1.45.35 2.83.94 4.03l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .94 4.97l3.01 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>

    <div class="switch-row">
      Already have an account? <a id="show-signin">Sign in</a>
    </div>
  </div>

  <!-- FORGOT PASSWORD FORM -->
  <div id="forgot-view" class="hidden">
    <h1>Reset password</h1>
    <p class="subtitle">We'll email you a reset link</p>

    <form id="forgot-form">
      <div class="field">
        <label for="forgot-email">Email</label>
        <input type="email" id="forgot-email" required autocomplete="email" placeholder="you@example.com" />
      </div>
      <button type="submit" class="btn btn-primary" id="forgot-btn">Send Reset Link</button>
    </form>

    <div class="switch-row">
      <a id="back-to-signin">Back to sign in</a>
    </div>
  </div>

  <!-- SIGNED IN VIEW -->
  <div id="user-view" class="hidden">
    <div class="user-panel">
      <div class="avatar" id="user-avatar">?</div>
      <h1 id="user-name">—</h1>
      <div class="user-email" id="user-email">—</div>
      <span class="verify-badge" id="verify-badge"></span>
      <br/>
      <button class="btn btn-secondary" id="resend-verify-btn">Resend verification email</button>
      <button class="btn btn-primary" id="signout-btn" style="margin-top:10px;">Sign Out</button>
    </div>
  </div>

</div>

<!-- Firebase SDKs (modular, v10, via CDN ESM) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged,
    sendPasswordResetEmail,
    sendEmailVerification,
    updateProfile,
    GoogleAuthProvider,
    signInWithPopup
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // Your Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyB2RZlRNlTONf4xuxjPMcZgedc9wbIhj-4",
    authDomain: "axid-ai.firebaseapp.com",
    projectId: "axid-ai",
    storageBucket: "axid-ai.firebasestorage.app",
    messagingSenderId: "354519561790",
    appId: "1:354519561790:web:e2b25803bcd713aea4836f",
    measurementId: "G-RBDLQZ6BZB"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();
  let analytics;
  try { analytics = getAnalytics(app); } catch (e) { /* analytics may fail on file:// or blocked env */ }

  // ---- DOM refs ----
  const views = {
    signin: document.getElementById("signin-view"),
    signup: document.getElementById("signup-view"),
    forgot: document.getElementById("forgot-view"),
    user: document.getElementById("user-view"),
  };
  const messageBox = document.getElementById("message");

  function showView(name) {
    Object.values(views).forEach(v => v.classList.add("hidden"));
    views[name].classList.remove("hidden");
    clearMessage();
  }

  function showMessage(text, type = "error") {
    messageBox.textContent = text;
    messageBox.className = "message " + type;
  }

  function clearMessage() {
    messageBox.textContent = "";
    messageBox.className = "message";
  }

  function setLoading(btn, loading, label) {
    btn.disabled = loading;
    btn.textContent = loading ? "Please wait…" : label;
  }

  // ---- Nav links ----
  document.getElementById("show-signup").addEventListener("click", () => showView("signup"));
  document.getElementById("show-signin").addEventListener("click", () => showView("signin"));
  document.getElementById("show-forgot").addEventListener("click", () => showView("forgot"));
  document.getElementById("back-to-signin").addEventListener("click", () => showView("signin"));

  // ---- Friendly Firebase error messages ----
  function friendlyError(error) {
    const code = error.code || "";
    const map = {
      "auth/email-already-in-use": "That email is already registered. Try signing in instead.",
      "auth/invalid-email": "That email address doesn't look right.",
      "auth/weak-password": "Password should be at least 6 characters.",
      "auth/user-not-found": "No account found with that email.",
      "auth/wrong-password": "Incorrect password. Try again.",
      "auth/invalid-credential": "Incorrect email or password.",
      "auth/too-many-requests": "Too many attempts. Please wait a moment and try again.",
      "auth/popup-closed-by-user": "Google sign-in was cancelled.",
      "auth/network-request-failed": "Network error. Check your connection and try again.",
    };
    return map[code] || error.message || "Something went wrong. Please try again.";
  }

  // ---- Sign Up ----
  document.getElementById("signup-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    clearMessage();
    const btn = document.getElementById("signup-btn");
    const name = document.getElementById("signup-name").value.trim();
    const email = document.getElementById("signup-email").value.trim();
    const password = document.getElementById("signup-password").value;

    setLoading(btn, true, "Create Account");
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      if (name) {
        await updateProfile(cred.user, { displayName: name });
      }
      await sendEmailVerification(cred.user);
      showMessage("Account created! Check your email to verify your address.", "success");
    } catch (error) {
      showMessage(friendlyError(error));
    } finally {
      setLoading(btn, false, "Create Account");
    }
  });

  // ---- Sign In ----
  document.getElementById("signin-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    clearMessage();
    const btn = document.getElementById("signin-btn");
    const email = document.getElementById("signin-email").value.trim();
    const password = document.getElementById("signin-password").value;

    setLoading(btn, true, "Sign In");
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (error) {
      showMessage(friendlyError(error));
    } finally {
      setLoading(btn, false, "Sign In");
    }
  });

  // ---- Forgot Password ----
  document.getElementById("forgot-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    clearMessage();
    const btn = document.getElementById("forgot-btn");
    const email = document.getElementById("forgot-email").value.trim();

    setLoading(btn, true, "Send Reset Link");
    try {
      await sendPasswordResetEmail(auth, email);
      showMessage("Reset link sent! Check your inbox.", "success");
    } catch (error) {
      showMessage(friendlyError(error));
    } finally {
      setLoading(btn, false, "Send Reset Link");
    }
  });

  // ---- Google Sign In (used for both sign in & sign up buttons) ----
  async function handleGoogleAuth() {
    clearMessage();
    try {
      await signInWithPopup(auth, googleProvider);
    } catch (error) {
      showMessage(friendlyError(error));
    }
  }
  document.getElementById("google-signin").addEventListener("click", handleGoogleAuth);
  document.getElementById("google-signup").addEventListener("click", handleGoogleAuth);

  // ---- Sign Out ----
  document.getElementById("signout-btn").addEventListener("click", async () => {
    await signOut(auth);
    showView("signin");
  });

  // ---- Resend verification email ----
  document.getElementById("resend-verify-btn").addEventListener("click", async () => {
    const user = auth.currentUser;
    if (!user) return;
    try {
      await sendEmailVerification(user);
      showMessage("Verification email sent!", "success");
    } catch (error) {
      showMessage(friendlyError(error));
    }
  });

  // ---- Auth state observer ----
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // Signed in -> go straight to the dashboard
      window.location.href = "dashboard.html";
    } else {
      showView("signin");
    }
  });
</script>

</body>
</html>
